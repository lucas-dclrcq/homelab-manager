quarkus.http.host=0.0.0.0

# API homelab-manager
quarkus.rest-client.manager-api.url=${MANAGER_API_URL:http://localhost:8080}
quarkus.rest-client.manager-api.scope=jakarta.inject.Singleton

# OIDC client credentials (grant "client" = client_credentials)
quarkus.oidc-client.auth-server-url=${OIDC_AUTH_SERVER_URL:http://localhost:8180/realms/homelab}
quarkus.oidc-client.client-id=${OIDC_CLIENT_ID:homelab-manager-operator}
quarkus.oidc-client.credentials.secret=${OIDC_CLIENT_SECRET:secret}
quarkus.oidc-client.grant.type=client

# Comportement de l'opérateur
homelab-operator.vpn-gateways=${VPN_GATEWAYS:internal}
homelab-operator.annotation-prefix=${ANNOTATION_PREFIX:homelab-manager.hoohoot.org}
homelab-operator.default-category=${DEFAULT_CATEGORY:Uncategorized}
homelab-operator.sync-interval=${SYNC_INTERVAL:5m}
homelab-operator.sync-on-start=true
%test.homelab-operator.sync-on-start=false
%test.quarkus.scheduler.enabled=false

# JOSDK : aucun CRD à nous, watch de toutes les namespaces
quarkus.operator-sdk.crd.generate=false
quarkus.operator-sdk.crd.apply=false
quarkus.operator-sdk.crd.validate=false
quarkus.operator-sdk.namespaces=${WATCH_NAMESPACES:JOSDK_ALL_NAMESPACES}
%test.quarkus.operator-sdk.start-operator=false

# Logging
quarkus.log.console.json.enabled=true
%dev.quarkus.log.console.json.enabled=false
%test.quarkus.log.console.json.enabled=false
