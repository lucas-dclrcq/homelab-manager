quarkus.http.host=0.0.0.0

# OPENAPI
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.store-schema-directory=src/main/webui/api
quarkus.smallrye-openapi.auto-add-security=false
# Les annotations Bean Validation ne doivent pas modifier le schéma OpenAPI (contrat Orval figé)
mp.openapi.scan.beanvalidation=false
# Endpoints opérateur exclus du contrat OpenAPI consommé par Orval
mp.openapi.scan.exclude.classes=org.hoohoot.homelab.manager.applications.api.OperatorApplicationsResource

# Clé partagée avec l'opérateur k8s (endpoints /api/operator/*), vérifiée par OperatorApiKeyFilter
operator.api-key=${OPERATOR_API_KEY:}
%dev.operator.api-key=dev-operator-key
%test.operator.api-key=test-operator-key

# OIDC
quarkus.oidc.application-type=web-app
quarkus.oidc.authentication.restore-path-after-redirect=true
quarkus.oidc.authentication.java-script-auto-redirect=false
quarkus.oidc.token.refresh-expired=true
quarkus.oidc.logout.path=/logout
quarkus.oidc.logout.post-logout-path=/
quarkus.oidc.authentication.session-age-extension=P30D

%prod.quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL}
%prod.quarkus.oidc.client-id=${OIDC_CLIENT_ID}
%prod.quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET}

quarkus.http.auth.permission.webhooks.paths=/api/notifications/*
quarkus.http.auth.permission.webhooks.policy=permit
# L'auth de /api/operator/* est portée par OperatorApiKeyFilter (la permission la plus spécifique gagne)
quarkus.http.auth.permission.operator-api.paths=/api/operator/*
quarkus.http.auth.permission.operator-api.policy=permit
quarkus.http.auth.permission.management.paths=/q/*
quarkus.http.auth.permission.management.policy=permit
quarkus.http.auth.permission.authenticated.paths=/*
quarkus.http.auth.permission.authenticated.policy=authenticated

quarkus.keycloak.devservices.users.alice=alice
quarkus.keycloak.devservices.roles.alice=admin,user
quarkus.keycloak.devservices.users.bob=bob
quarkus.keycloak.devservices.roles.bob=user

# Logging

quarkus.log.console.format=%d{HH:mm:ss} %-5p traceId=%X{traceId}, parentId=%X{parentId}, spanId=%X{spanId}, sampled=%X{sampled} [%c{2.}] (%t) %s%e%n
quarkus.log.category."de.connect2x.trixnity.clientserverapi.client.SyncApiClient".level=WARN

%dev.quarkus.log.console.json.enabled=false
%test.quarkus.log.console.json.enabled=false

# Frontend
quarkus.quinoa.dev-server.port=3000
quarkus.quinoa.build-dir=dist
quarkus.quinoa.enable-spa-routing=true
quarkus.quinoa.package-manager-install.node-version=20.19.0
quarkus.quinoa.package-manager-install.npm-version=10.3.0
# Lance lint + tests du frontend pendant `mvn verify` (test:ci = eslint + vitest).
# Le type-check (vue-tsc) + le bundle tournent déjà via `npm run build`.
quarkus.quinoa.run-tests=true
quarkus.quinoa.package-manager-command.test=run test:ci

# Sonarr API

quarkus.rest-client.sonarr-api.url=${SONARR_BASE_URL:http://localhost:8080}
quarkus.rest-client.sonarr-api.scope=jakarta.inject.Singleton

sonarr.api_key=API_KEY

# Radarr API

quarkus.rest-client.radarr-api.url=${RADARR_BASE_URL:http://localhost:7878}
quarkus.rest-client.radarr-api.scope=jakarta.inject.Singleton
# La recherche interactive de releases interroge tous les indexers : réponse longue possible
quarkus.rest-client.radarr-api.read-timeout=120000

radarr.api_key=${RADARR_API_KEY:API_KEY}

# Lidarr API

quarkus.rest-client.lidarr-api.url=${LIDARR_BASE_URL:http://localhost:8686}
quarkus.rest-client.lidarr-api.scope=jakarta.inject.Singleton

lidarr.api_key=${LIDARR_API_KEY:API_KEY}

# Weekly Report

weekly-report.cron=0 0 21 ? * SUN

radarr-sync.every=15m
sonarr-sync.every=15m
stats-sync.initial-delay=0s
%test.stats-sync.initial-delay=1h

# Downloads timeline sync

downloads-sync.every=15m
downloads-sync.initial-delay=0s
%test.downloads-sync.initial-delay=1h
downloads-sync.backfill-days=30
downloads-sync.bazarr.page-length=250

# Bazarr API

quarkus.rest-client.bazarr-api.url=${BAZARR_BASE_URL:http://localhost:6767}
quarkus.rest-client.bazarr-api.scope=jakarta.inject.Singleton

bazarr.api_key=${BAZARR_API_KEY:API_KEY}

# Jellyfin API

quarkus.rest-client.jellyfin-api.url=${JELLYFIN_BASE_URL:http://localhost:8081}
quarkus.rest-client.jellyfin-api.scope=jakarta.inject.Singleton

jellyfin.api_key=${JELLYFIN_API_KEY:API_KEY}

# Statistiques de visionnage : polling des sessions Jellyfin
statistics.poll.every=15s
%test.statistics.poll.every=off
statistics.min-play-seconds=120
statistics.stale-after-seconds=600
statistics.completed-threshold=0.85
# Timezone d'affichage des agrégations horaires/journalières (la base stocke de l'UTC)
statistics.timezone=Europe/Paris

# Import du backup Jellystat : le fichier uploadé est stagé ici puis traité par le job jellystat-import
statistics.import.staging-path=${java.io.tmpdir}/jellystat-backup.json
# Le backup Jellystat pèse des centaines de Mo (MediaStreams par session)
quarkus.http.limits.max-body-size=500M

# Giphy

quarkus.rest-client.giphy-api.url=${GIPHY_BASE_URL:https://api.giphy.com}
# Base requise au démarrage ; @Url la remplace par l'URL absolue du gif à chaque appel
quarkus.rest-client.giphy-media.url=https://media.giphy.com
giphy.api_key=API_KEY
giphy.rating=g

# Logos d'applications
# Base requise au démarrage ; @Url la remplace par l'URL absolue du logo à chaque appel
quarkus.rest-client.logo-download.url=https://cdn.jsdelivr.net

# Authentik (annuaire des membres pour les finances)

quarkus.rest-client.authentik-api.url=${AUTHENTIK_BASE_URL:http://localhost:9000}
quarkus.rest-client.authentik-api.scope=jakarta.inject.Singleton

authentik.token=${AUTHENTIK_TOKEN:TOKEN}
# Nom du groupe Authentik limitant les membres synchronisés (vide = tous les utilisateurs)
member-sync.group=${MEMBER_SYNC_GROUP:}
member-sync.every=6h
member-sync.initial-delay=1m
%test.member-sync.initial-delay=1h

# Prometheus (estimation des dépenses énergétiques via l'onduleur)

quarkus.rest-client.prometheus-api.url=${PROMETHEUS_BASE_URL:https://prometheus.hoohoot.xyz}
quarkus.rest-client.prometheus-api.scope=jakarta.inject.Singleton

# Nettoyage : campagnes de libération d'espace disque (scan sous seuil, grâce avec veto, suppression auto)
cleanup.scan.every=1h
cleanup.scan.initial-delay=2m
%test.cleanup.scan.initial-delay=1h
cleanup.execute.every=1h
cleanup.execute.initial-delay=5m
%test.cleanup.execute.initial-delay=1h
cleanup.suggestion.every=1h
cleanup.suggestion.initial-delay=7m
%test.cleanup.suggestion.initial-delay=1h
# Doit correspondre exactement à un chemin remonté par GET /diskspace (vu des containers *arr)
cleanup.disk-path=${CLEANUP_DISK_PATH:/media}
# Les stubs WireMock (dev) et les seeds de test remontent le chemin /data
%dev.cleanup.disk-path=/data
%test.cleanup.disk-path=/data
cleanup.threshold-free-gb=200
cleanup.target-free-gb=300
# Le stub WireMock dev remonte 500 Go libres : seuils dev au-dessus pour pouvoir déclencher un scan
%dev.cleanup.threshold-free-gb=600
%dev.cleanup.target-free-gb=10000
%dev.cleanup.min-age-days=30
%dev.cleanup.grace-days=1
cleanup.grace-days=14
%dev.cleanup.suggestion.grace-days=1
cleanup.suggestion.grace-days=2
cleanup.min-age-days=180
cleanup.recent-series-watch-days=180
cleanup.in-progress-days=30
cleanup.max-candidates=30
cleanup.min-score=40
cleanup.score.full-age-days=365
cleanup.score.size-ref-gb=30
cleanup.score.weight.last-watched=35
cleanup.score.weight.download-age=20
cleanup.score.weight.size=20
cleanup.score.weight.completion=15
cleanup.score.weight.requester-activity=10

# URL publique de l'app (liens dans les annonces Matrix)
app.public-url=${APP_PUBLIC_URL:http://localhost:8080}

# Finances : génération des écritures récurrentes (tous les jours à 05:30)
finance-recurring.cron=0 30 5 * * ?
# Finances : dépense énergétique du mois écoulé (le 1er du mois à 06:00)
energy-expense.cron=0 0 6 1 * ?

quarkus.otel.enabled=true
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317

%dev.quarkus.otel.enabled=false
%test.quarkus.otel.enabled=false

# WireMock DevService - point REST clients to WireMock in dev/test mode
%dev.quarkus.wiremock.devservices.files-mapping=src/main/resources/wiremock
%dev.quarkus.rest-client.sonarr-api.url=http://localhost:${quarkus.wiremock.devservices.port}
%dev.quarkus.rest-client.radarr-api.url=http://localhost:${quarkus.wiremock.devservices.port}
%dev.quarkus.rest-client.lidarr-api.url=http://localhost:${quarkus.wiremock.devservices.port}
%dev.quarkus.rest-client.jellyfin-api.url=http://localhost:${quarkus.wiremock.devservices.port}
%dev.quarkus.rest-client.giphy-api.url=http://localhost:${quarkus.wiremock.devservices.port}
%dev.quarkus.rest-client.giphy-media.url=http://localhost:${quarkus.wiremock.devservices.port}
%dev.quarkus.rest-client.logo-download.url=http://localhost:${quarkus.wiremock.devservices.port}
%dev.quarkus.rest-client.bazarr-api.url=http://localhost:${quarkus.wiremock.devservices.port}
%dev.quarkus.rest-client.authentik-api.url=http://localhost:${quarkus.wiremock.devservices.port}
%dev.quarkus.rest-client.prometheus-api.url=http://localhost:${quarkus.wiremock.devservices.port}

%test.quarkus.rest-client.sonarr-api.url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.rest-client.radarr-api.url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.rest-client.lidarr-api.url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.rest-client.jellyfin-api.url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.rest-client.giphy-api.url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.rest-client.giphy-media.url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.rest-client.logo-download.url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.rest-client.bazarr-api.url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.rest-client.authentik-api.url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.rest-client.prometheus-api.url=http://localhost:${quarkus.wiremock.devservices.port}

# Database
quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.mapping.format.global=ignore
quarkus.flyway.migrate-at-start=true

%prod.quarkus.datasource.reactive.url=${DB_REACTIVE_URL}
%prod.quarkus.datasource.jdbc.url=${DB_JDBC_URL}
%prod.quarkus.datasource.username=${DB_USERNAME}
%prod.quarkus.datasource.password=${DB_PASSWORD}
