{{- if and .Values.operator.enabled .Values.operator.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "homelab-manager.operator.fullname" . }}
  labels:
    {{- include "homelab-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "homelab-manager.operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "homelab-manager.operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
