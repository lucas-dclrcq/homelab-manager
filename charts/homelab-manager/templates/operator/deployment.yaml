{{- if .Values.operator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "homelab-manager.operator.fullname" . }}
  labels:
    {{- include "homelab-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
spec:
  replicas: {{ .Values.operator.replicaCount }}
  selector:
    matchLabels:
      {{- include "homelab-manager.operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.operator.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "homelab-manager.operator.selectorLabels" . | nindent 8 }}
        {{- with .Values.operator.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "homelab-manager.operator.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: operator
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MANAGER_API_URL
              value: {{ .Values.operator.managerApiUrl | default (printf "http://%s.%s.svc.cluster.local:%d" (include "homelab-manager.fullname" .) .Release.Namespace (int .Values.app.service.port)) | quote }}
            {{- with .Values.operator.watchNamespaces }}
            - name: WATCH_NAMESPACES
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.operatorApiKey.existingSecret }}
            - name: OPERATOR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.operatorApiKey.existingSecret }}
                  key: {{ .Values.operatorApiKey.key }}
            {{- end }}
            {{- with .Values.operator.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.operator.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.operator.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.operator.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.operator.startupProbe | nindent 12 }}
          {{- with .Values.operator.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.operator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
