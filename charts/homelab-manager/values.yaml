nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/lucas-dclrcq/homelab-manager
  # Defaults to the chart appVersion
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Clé API partagée entre l'app et l'opérateur (endpoints /api/operator/*).
# Injectée en OPERATOR_API_KEY dans les deux conteneurs depuis un secret existant.
# Si absente côté app, tous les appels opérateur sont rejetés en 401 (fail-closed).
operatorApiKey:
  existingSecret: ""
  key: operator-api-key

app:
  replicaCount: 1

  # Raw Kubernetes EnvVar entries (name/value or valueFrom)
  env: []
  # - name: SONARR_BASE_URL
  #   value: http://sonarr.media.svc.cluster.local:8989

  # Inject everything from an existing secret/configmap
  envFrom: []
  # - secretRef:
  #     name: homelab-manager-secrets

  service:
    type: ClusterIP
    port: 8080

  route:
    enabled: true
    annotations: {}
    parentRefs: []
    # - name: internal
    #   namespace: kube-system
    #   sectionName: https
    hostnames: []
    # - manager.hoohoot.org

  resources: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

  livenessProbe:
    httpGet:
      path: /q/health/live
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /q/health/ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 3
  startupProbe:
    httpGet:
      path: /q/health/started
      port: http
    periodSeconds: 5
    failureThreshold: 30

operator:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/lucas-dclrcq/homelab-manager-operator
    # Defaults to the chart appVersion
    tag: ""
    pullPolicy: IfNotPresent

  # URL of the manager API; empty = the app service of this release
  managerApiUrl: ""

  # Comma-separated list of namespaces to watch; empty = all namespaces
  watchNamespaces: ""

  env: []
  envFrom: []
  # - secretRef:
  #     name: homelab-manager-operator-secrets

  serviceAccount:
    create: true
    # Defaults to <fullname>-operator
    name: ""
    annotations: {}

  rbac:
    create: true

  service:
    # Exposes /q/metrics
    enabled: true
    port: 8080

  resources: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

  livenessProbe:
    httpGet:
      path: /q/health/live
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /q/health/ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 3
  startupProbe:
    httpGet:
      path: /q/health/started
      port: http
    periodSeconds: 5
    failureThreshold: 30
